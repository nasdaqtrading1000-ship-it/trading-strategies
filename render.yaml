services:
  - type: web
    name: trading-strategies
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: DATABASE_URL
        sync: false
  - type: cron
    name: trading-scheduled-tasks
    runtime: python
    schedule: "*/10 * * * MON-FRI"
    buildCommand: pip install -r requirements.txt
    startCommand: python run_scheduled_tasks.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
