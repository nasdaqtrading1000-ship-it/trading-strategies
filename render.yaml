services:
  - type: web
    name: trading-strategies
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: waitress-serve --listen=0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: DATABASE_URL
        sync: false
  - type: cron
    name: trading-market-data-update
    runtime: python
    schedule: "30 20 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python update_market_data.py --full
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
