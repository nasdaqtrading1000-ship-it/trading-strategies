{% extends "base.html" %}

{% block title %}Acceso administrador{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="login-panel mx-auto p-4 p-md-5">
    <h1 class="h3 mb-2">Panel de administracion</h1>
    <p class="text-secondary mb-4">Acceso protegido para gestionar estrategias y enlaces de Telegram.</p>
    <form method="post" class="vstack gap-3">
      <div>
        <label for="password" class="form-label">Contrasena</label>
        <input class="form-control form-control-lg" type="password" id="password" name="password" required autofocus>
      </div>
      <button class="btn btn-info btn-lg fw-semibold" type="submit">Entrar</button>
    </form>
  </div>
</section>
{% endblock %}
