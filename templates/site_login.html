{% extends "base.html" %}

{% block title %}Acceso privado{% endblock %}

{% block content %}
<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-5">
      <div class="form-panel p-4 p-md-5">
        <p class="text-info fw-semibold mb-2">Acceso privado</p>
        <h1 class="h3 mb-3">Nasdaq Trading Hub</h1>
        <p class="text-secondary mb-4">Esta pagina esta temporalmente protegida mientras se trabaja en ella.</p>
        <form method="post">
          <div class="mb-3">
            <label class="form-label" for="password">Contrasena de acceso</label>
            <input class="form-control" id="password" name="password" type="password" required autofocus>
          </div>
          <button class="btn btn-info w-100 fw-semibold" type="submit">Entrar</button>
        </form>
        <div class="mt-4">
          <a class="text-secondary small" href="{{ url_for('login') }}">Acceso administracion</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
